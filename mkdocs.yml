site_name: AddiVortes
site_description: Bayesian Additive Voronoi Tessellation regression for Python
site_url: https://johnpaulgosling.github.io/py-addivortes/
repo_url: https://github.com/johnpaulgosling/py-addivortes
repo_name: johnpaulgosling/py-addivortes

theme:
  name: material
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy

nav:
  - Home: index.md
  - Installation: installation.md
  - Quick start: quickstart.md
  - Tutorials:
      - Machine learning with AddiVortes: tutorials/introduction.md
      - Bayesian regression and prediction: tutorials/prediction.md
      - Convergence diagnostics and trace analysis: tutorials/convergence.md
      - Modelling spherical data: tutorials/spherical.md
      - Using categorical covariates: tutorials/categorical.md
  - API reference: api.md
  - Release checklist: release.md

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - pymdownx.highlight
  - pymdownx.superfences
