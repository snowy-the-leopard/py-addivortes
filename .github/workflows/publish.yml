name: Publish Python package

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  build-sdist:
    name: Build source distribution
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build source distribution
        run: |
          python -m pip install --upgrade pip
          python -m pip install build
          python -m build --sdist

      - name: Upload source distribution
        uses: actions/upload-artifact@v4
        with:
          name: python-distributions-sdist
          path: dist/*.tar.gz

  build-wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            cibw-archs: x86_64
          - os: macos-13
            cibw-archs: x86_64
          - os: macos-14
            cibw-archs: arm64
          - os: windows-latest
            cibw-archs: AMD64

    steps:
      - uses: actions/checkout@v4

      - name: Build wheels
        uses: pypa/cibuildwheel@v3.4.1
        env:
          CIBW_ARCHS: ${{ matrix.cibw-archs }}

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: python-distributions-wheels-${{ matrix.os }}-${{ matrix.cibw-archs }}
          path: wheelhouse/*.whl

  publish:
    name: Publish distributions to PyPI
    needs: [build-sdist, build-wheels]
    runs-on: ubuntu-latest
    environment: pypi

    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          pattern: python-distributions-*
          path: dist
          merge-multiple: true

      - name: Check distributions
        run: |
          python -m pip install --upgrade pip
          python -m pip install twine
          python -m twine check dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
