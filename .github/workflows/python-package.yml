name: Python checks

on:
  push:
    branches: [main, py-addivortes]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install ".[test]"

      - name: Run tests
        run: python -m pytest

  package:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build package distributions
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade build packaging twine
          python -m build --sdist
          python -m twine check dist/*

      - name: Build Linux wheel
        uses: pypa/cibuildwheel@v3.4.1
        env:
          CIBW_ARCHS: x86_64

      - name: Check wheel metadata
        run: python -m twine check wheelhouse/*.whl

      - name: Test wheel install
        run: |
          python -m pip install "$GITHUB_WORKSPACE"/wheelhouse/addivortes-*.whl
          (
            cd /tmp
            python - <<'PY'
          from addivortes import AddiVortesRegressor
          print(AddiVortesRegressor)
          PY
          )

      - name: Test source distribution install
        run: |
          python -m pip uninstall -y addivortes
          python -m pip install "$GITHUB_WORKSPACE"/dist/addivortes-*.tar.gz
          (
            cd /tmp
            python - <<'PY'
          from addivortes import AddiVortesRegressor
          print(AddiVortesRegressor)
          PY
          )

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: python-distributions
          path: |
            dist/*
            wheelhouse/*

  docs:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build docs
        run: |
          python -m pip install --upgrade pip
          python -m pip install ".[docs]"
          python -m mkdocs build --strict
